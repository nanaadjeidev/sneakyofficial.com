<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splatdle — Down for Maintenance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #020617 100%);
      color: #f8fafc;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(251,146,60,0.25);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      max-width: 28rem;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 900;
      background: linear-gradient(90deg, #fb923c, #f472b6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    p {
      color: #cbd5e1;
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .apology {
      color: #94a3b8;
      font-size: 0.8125rem;
      margin-bottom: 1.75rem;
    }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(88,101,242,0.2);
      border: 1px solid rgba(88,101,242,0.4);
      color: #a5b4fc;
      text-decoration: none;
      padding: 0.625rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s;
    }

    .discord-btn:hover {
      background: rgba(88,101,242,0.35);
      border-color: rgba(88,101,242,0.6);
    }

    .discord-btn svg {
      width: 1.125rem;
      height: 1.125rem;
      fill: currentColor;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(251,146,60,0.12);
      border: 1px solid rgba(251,146,60,0.3);
      color: #fb923c;
      text-decoration: none;
      padding: 0.625rem 1.25rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      margin-right: 0.5rem;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .retry-btn:hover {
      background: rgba(251,146,60,0.22);
      border-color: rgba(251,146,60,0.5);
    }

    .btn-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🦑</span>
    <h1>Splatdle is Down</h1>
    <p class="subtitle">Guess the Splatoon weapon of the day</p>

    <p>The site is currently offline for maintenance (or something broke — probably something broke).</p>
    <p class="apology">Sorry about that. Come shout at me on Discord while you wait.</p>

    <div class="btn-row">
    <a class="retry-btn" id="retry-link" href="/">↩ Try again</a>
    <a class="discord-btn" href="https://discord.gg/gmJeQefe5X" target="_blank" rel="noopener noreferrer">

      </svg>
      Join the Discord
    </a>
    </div>
  </div>
  <script>
    document.getElementById('retry-link').href = window.location.origin;
  </script>
</body>
</html>
